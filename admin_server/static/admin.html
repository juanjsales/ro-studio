<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Administração de Licenças – RemBG Automation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="glass-card">
    <h1>Gerador de Licenças</h1>
    <form id="keyForm">
      <label for="tier">Tipo (Tier)</label>
      <select id="tier" name="tier">
        <option value="basic">Basic</option>
        <option value="pro">Pro</option>
        <option value="enterprise">Enterprise</option>
      </select>
      <label for="duration">Duração (dias)</label>
      <input type="number" id="duration" name="duration_days" min="1" value="30"/>
      <label class="checkbox-label">
        <input type="checkbox" id="active" name="is_active" checked/>
        Ativa
      </label>
      <button type="submit" class="cta-button">Gerar Chave</button>
    </form>
    <div id="result" class="hidden">
      <p>Chave Gerada:</p>
      <code id="generatedKey" class="key-output"></code>
      <button id="copyBtn" class="copy-button">Copiar</button>
    </div>
  </div>
  <script src="admin.js"></script>
</body>
</html>
